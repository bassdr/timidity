# PipeWire low-latency configuration for TiMidity++ real-time MIDI synthesis.
#
# Install to /etc/pipewire/pipewire.conf.d/ (system-wide) or
# ~/.config/pipewire/pipewire.conf.d/ (per-user).
#
# This sets the audio graph quantum to 128 frames (~2.7ms at 48kHz),
# which reduces the latency floor for MIDI-to-audio playback.
#
# If you hear crackling or see xruns in pw-top, increase
# default.clock.quantum to 256 or 512.
#
# Restart PipeWire after installing:
#   systemctl --user restart pipewire

context.properties = {
    default.clock.quantum       = 128
    default.clock.min-quantum   = 64
    default.clock.max-quantum   = 1024
}
